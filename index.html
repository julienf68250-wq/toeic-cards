<style>
  :root{
    --bg:#e8ebf2; --card:#ffffff; --ink:#16213a; --muted:#6b7689;
    --blue:#2f6df5; --blue-d:#1f4fc4; --green:#169d6a; --amber:#e08a1e;
    --line:#d6dbe6; --shadow:0 18px 40px -18px rgba(22,33,58,.45);
    --radius:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#f2f4f9 0%,var(--bg) 55%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;
    min-height:100%;padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));
  }
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;flex:1}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:4px 2px 12px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-top:1px}
  .stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.5;white-space:nowrap}
  .stats b{color:var(--green)}
  /* filters */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* direction toggle */
  .dir{display:flex;background:#dfe4ee;border-radius:999px;padding:3px;margin:2px 2px 14px;align-self:center}
  .dir button{border:0;background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;
    padding:7px 16px;border-radius:999px;cursor:pointer}
  .dir button[aria-pressed="true"]{background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.08)}
  /* card */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1400px;min-height:300px}
  .card{position:relative;width:100%;height:340px;cursor:pointer;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
  .card.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:26px 24px;text-align:center;border:1px solid rgba(255,255,255,.6)}
  .face .eyebrow{position:absolute;top:18px;left:0;right:0;font-size:10.5px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--blue)}
  .face .lang{position:absolute;top:18px;right:18px;font-size:10px;font-weight:700;color:var(--muted);
    letter-spacing:.1em}
  .word{font-size:clamp(26px,7.5vw,40px);font-weight:800;letter-spacing:-.02em;line-height:1.12}
  .back{transform:rotateY(180deg);background:linear-gradient(170deg,#fff,#f4f7ff)}
  .back .word{color:var(--blue-d)}
  .ex{margin-top:16px;font-size:14.5px;color:var(--muted);font-style:italic;max-width:90%;line-height:1.45}
  .hint{position:absolute;bottom:16px;left:0;right:0;font-size:11.5px;color:#aab2c2;font-weight:600}
  /* rating + nav */
  .rate{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn{border:0;border-radius:14px;padding:15px;font-size:14.5px;font-weight:800;cursor:pointer;color:#fff;transition:.12s}
  .btn:active{transform:scale(.97)}
  .again{background:var(--amber)}
  .know{background:var(--green)}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
  .nav button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;
    font-size:13px;padding:11px;border-radius:12px;cursor:pointer}
  .nav button:active{background:#eef1f7}
  .bar{height:6px;background:#d8dde8;border-radius:99px;overflow:hidden;margin:14px 2px 2px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .3s}
  /* done */
  .done{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 26px;height:340px}
  .done h2{margin:0 0 6px;font-size:24px}.done p{color:var(--muted);margin:0 0 22px}
  .done button{background:var(--blue);color:#fff;border:0;border-radius:14px;padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer}
  @media (prefers-reduced-motion:reduce){.card{transition:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Flashcards<small>TOEIC · Objectif B2</small></div>
    <div class="stats"><span id="remain">—</span> à réviser<br><b id="known">0</b> maîtrisées</div>
  </header>

  <div class="chips" id="chips"></div>
  <div class="dir" role="group" aria-label="Sens de révision">
    <button id="d-enfr" aria-pressed="true">EN → FR</button>
    <button id="d-fren" aria-pressed="false">FR → EN</button>
  </div>

  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Carte, taper pour retourner">
      <div class="face front">
        <div class="eyebrow" id="cat-f"></div><div class="lang" id="lang-f"></div>
        <div class="word" id="front"></div>
        <div class="hint">Taper pour retourner</div>
      </div>
      <div class="face back">
        <div class="eyebrow" id="cat-b"></div><div class="lang" id="lang-b"></div>
        <div class="word" id="back"></div>
        <div class="ex" id="ex"></div>
      </div>
    </div>
    <div class="done" id="done">
      <h2>Série terminée 🎉</h2>
      <p id="done-msg"></p>
      <button id="restart">Recommencer cette catégorie</button>
    </div>
  </div>

  <div class="rate" id="rate">
    <button class="btn again" id="again">À revoir</button>
    <button class="btn know" id="know">Je savais</button>
  </div>
  <div class="nav">
    <button id="prev">◀ Précédent</button>
    <button id="shuffle">🔀 Mélanger</button>
    <button id="next">Suivant ▶</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
</div>

// --- state ---
const cats = [...new Set(DATA.map(d=>d.c))];
const LS_KEY="toeic_cards_v1";
let store={known:[],filter:"Tout",dir:"enfr"};
function load(){try{const r=localStorage.getItem(LS_KEY);if(r)store={...store,...JSON.parse(r)};}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify({...store,known:[...known]}));}catch(e){}}
load();
let filter=store.filter||"Tout", dir=store.dir||"enfr", deck=[], idx=0, flipped=false;
const known=new Set(store.known||[]);   // ids maîtrisés (persistés localement)
const cardId=d=>d.c+"|"+d.en;

const $=id=>document.getElementById(id);
const card=$("card");

// build chips
const chips=$("chips");
["Tout",...cats].forEach(c=>{
  const b=document.createElement("button");
  b.className="chip";b.textContent=c;b.setAttribute("aria-pressed",c===filter);
  b.onclick=()=>{filter=c;store.filter=c;save();[...chips.children].forEach(x=>x.setAttribute("aria-pressed",x===b));rebuild();};
  chips.appendChild(b);
});

function pool(){return DATA.filter(d=>filter==="Tout"||d.c===filter);}
function rebuild(){
  deck=pool().filter(d=>!known.has(cardId(d)));
  idx=0;flipped=false;render();
}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;flipped=false;render();}

function setDir(d){
  dir=d;store.dir=d;save();$("d-enfr").setAttribute("aria-pressed",d==="enfr");$("d-fren").setAttribute("aria-pressed",d==="fren");
  flipped=false;render();
}
$("d-enfr").onclick=()=>setDir("enfr");
$("d-fren").onclick=()=>setDir("fren");
$("d-enfr").setAttribute("aria-pressed",dir==="enfr");$("d-fren").setAttribute("aria-pressed",dir==="fren");

function render(){
  const total=pool().length, kn=pool().filter(d=>known.has(cardId(d))).length;
  $("known").textContent=kn;$("remain").textContent=deck.length;
  $("prog").style.width=total?Math.round(kn/total*100)+"%":"0%";

  if(deck.length===0){
    card.style.display="none";$("rate").style.visibility="hidden";
    $("done").style.display="flex";
    $("done-msg").textContent=total?`${total} cartes maîtrisées dans « ${filter} ».`:"Aucune carte ici.";
    return;
  }
  card.style.display="";$("done").style.display="none";$("rate").style.visibility="visible";
  if(idx>=deck.length)idx=0; if(idx<0)idx=deck.length-1;
  const d=deck[idx];
  const frontEn = dir==="enfr";
  $("front").textContent = frontEn?d.en:d.fr;
  $("back").textContent  = frontEn?d.fr:d.en;
  $("lang-f").textContent= frontEn?"EN":"FR";
  $("lang-b").textContent= frontEn?"FR":"EN";
  $("cat-f").textContent=d.c;$("cat-b").textContent=d.c;
  $("ex").textContent=d.ex||"";
  card.classList.toggle("flip",flipped);
}

function flip(){flipped=!flipped;card.classList.toggle("flip",flipped);}
function go(step){if(!deck.length)return;flipped=false;idx=(idx+step+deck.length)%deck.length;render();}
function markKnown(){if(!deck.length)return;known.add(cardId(deck[idx]));save();deck.splice(idx,1);flipped=false;render();}
function markAgain(){go(1);}   // garde la carte dans le paquet, passe à la suivante

card.onclick=flip;
card.onkeydown=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}};
$("next").onclick=()=>go(1);
$("prev").onclick=()=>go(-1);
$("shuffle").onclick=shuffle;
$("again").onclick=markAgain;
$("know").onclick=markKnown;
$("restart").onclick=()=>{pool().forEach(d=>known.delete(cardId(d)));save();rebuild();};
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);
  if(e.key.toLowerCase()==="k")markKnown();if(e.key.toLowerCase()==="a")markAgain();
});

// bouton de réinitialisation globale de la progression
const resetBtn=document.createElement("button");
resetBtn.textContent="\u21BA Réinitialiser ma progression";
resetBtn.style.cssText="margin:12px auto 0;display:block;font-size:11px;color:#9aa0a6;background:none;border:0;cursor:pointer";
resetBtn.onclick=()=>{ if(confirm("Effacer toute la progression mémorisée ?")){ known.clear();store.known=[];store.filter="Tout";save();filter="Tout";[...chips.children].forEach((x,i)=>x.setAttribute("aria-pressed",i===0));rebuild(); } };
document.querySelector(".wrap").appendChild(resetBtn);

rebuild();
</script>
