<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Phrases d'examen — TOEIC</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOEIC Phrases">
<meta name="theme-color" content="#d9a441">
<style>
  :root{ --bg:#10151c; --card:#1a2230; --ink:#e8edf4; --muted:#93a1b2; --line:#2a3440;
    --acc:#e0a93a; --acc-d:#f0c46a; --green:#28b27a; --r:16px; }
  body.light{ --bg:#f6f1e7; --card:#fff; --ink:#2a2316; --muted:#7a6f5c; --line:#e8dcc6; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#17212e 0%,var(--bg) 60%);color:var(--ink);
    padding:max(14px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));}
  body.light{background:radial-gradient(120% 80% at 50% -10%,#fbf6ec 0%,var(--bg) 60%);}
  .wrap{max-width:560px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:4px 2px 10px}
  h1{font-size:20px;margin:0;letter-spacing:-.02em}
  h1 small{display:block;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-top:2px}
  .stat{font-size:12px;color:var(--muted);text-align:right;white-space:nowrap}
  .stat b{color:var(--green)}
  .mode{display:flex;background:rgba(255,255,255,.06);border-radius:999px;padding:3px;width:fit-content;margin:8px 0}
  body.light .mode{background:rgba(0,0,0,.05)}
  .mode button{border:0;background:transparent;color:var(--muted);font-weight:800;font-size:13px;padding:7px 16px;border-radius:999px;cursor:pointer}
  .mode button[aria-pressed="true"]{background:var(--acc);color:#1a1205}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  body.light .chip[aria-pressed="true"]{color:#fff}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin:6px 2px 4px}
  .toolbar .t{font-size:12.5px;color:var(--muted)}
  .switch{font-size:12.5px;font-weight:700;color:var(--acc-d);background:none;border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer}
  .step{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 14px 8px;margin:10px 0}
  .step h3{margin:0 0 8px;font-size:13.5px;color:var(--acc-d);display:flex;align-items:center;gap:8px}
  .step h3 .n{background:var(--acc);color:#1a1205;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto}
  .chunk{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line);cursor:pointer}
  .chunk:first-of-type{border-top:0}
  .chunk .en{font-size:15px;font-weight:600;line-height:1.4}
  .chunk .fr{font-size:12px;color:var(--muted);margin-top:2px}
  .chunk .mark{margin-left:auto;flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent}
  .chunk.done .mark{background:var(--green);border-color:var(--green);color:#fff}
  .chunk.done .en{color:var(--muted)}
  body.test .chunk .en,body.test .chunk .fr{filter:blur(5px);transition:filter .2s}
  body.test .step.reveal .chunk .en,body.test .step.reveal .chunk .fr{filter:none}
  body.test .step{cursor:pointer}
  .hint{font-size:11.5px;color:var(--muted);margin:2px 2px 0}
  details{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin:12px 0}
  summary{cursor:pointer;font-weight:800;font-size:13px;color:var(--acc-d)}
  .example-item{font-size:14px;line-height:1.6;margin:10px 0;font-style:italic;border-left:3px solid var(--acc);padding-left:10px}
  .example-item b{font-style:normal;color:var(--acc-d);font-size:12px;display:block;margin-bottom:2px;letter-spacing:.04em}
  .footer{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .footer button{font-size:11px;color:var(--muted);background:none;border:0;cursor:pointer}
  .quiz{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px}
  .quiz .sc{font-size:12px;color:var(--muted);text-align:right;margin-bottom:6px}
  .quiz .q{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.4}
  .quiz .opt{display:block;width:100%;text-align:left;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:12px;padding:12px;margin:7px 0;font-size:14px;cursor:pointer}
  .quiz .opt.good{background:rgba(40,178,122,.18);border-color:var(--green)}
  .quiz .opt.bad{background:rgba(214,71,58,.16);border-color:#d6473a}
  .quiz .fb{font-size:13px;color:var(--muted);margin:8px 0;min-height:18px;line-height:1.5}
  .quiz .next{background:var(--acc);color:#1a1205;border:0;border-radius:12px;padding:12px 16px;font-weight:800;cursor:pointer;width:100%}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>Phrases d'examen<small>TOEIC · Speaking & Writing</small></h1></div>
    <div class="stat"><b id="learned">0</b> apprises</div>
  </header>
  <div class="mode" role="group">
    <button id="m-spk" aria-pressed="true">🗣️ Speaking</button>
    <button id="m-wrt" aria-pressed="false">✍️ Writing</button>
    <button id="m-quiz" aria-pressed="false">✅ Exercices</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="toolbar">
    <div class="t" id="exinfo"></div>
    <button class="switch" id="testBtn">👁 Mode test</button>
  </div>
  <div class="hint" id="hint"></div>
  <div id="content"></div>
  <div id="quiz" class="quiz" style="display:none">
    <div class="sc">Score : <span id="qscore">0</span> / <span id="qtotal">0</span></div>
    <div class="q" id="qprompt"></div>
    <div id="qopts"></div>
    <div class="fb" id="qfb"></div>
    <button class="next" id="qnext">Question suivante →</button>
  </div>
  <details id="exwrap"><summary>📄 Exemples assemblés</summary><div id="example"></div></details>
  <div class="footer">
    <button id="reset">↺ Réinitialiser les acquis</button>
    <button id="theme">☀️ Mode clair</button>
  </div>
</div>
<script>

    {f:"Clôture + signature",c:[["I look forward to hearing from you.","Dans l'attente de votre réponse."],["Please let me know if you need anything else.","N'hésitez pas si besoin d'autre chose."],["Thank you in advance for your help.","Merci d'avance pour votre aide."],["Best regards, ... / Kind regards, ...","Cordialement, ..."]]}
   ],
   ex:[["2 demandes + 1 question","Dear Mr Carter, Thank you for your email regarding my order. I am writing to raise a few points. First, could you please send me the invoice? Second, I would like to request the warranty details. I also have one question: is monthly delivery possible? I look forward to hearing from you. Best regards, ..."],
       ["2 suggestions + 1 question","Dear HR team, Thank you for getting in touch about the team-building day. I would suggest an outdoor activity in the morning. It might also be a good idea to organise a shared lunch. Finally, I was wondering whether the budget is already fixed. Thank you in advance for your help. Kind regards, ..."]]},

    {f:"Argument 1 + exemple",c:[["First of all,...","Tout d'abord,..."],["The main reason is that...","La raison principale est que..."],["For instance,...","Par exemple,..."]]},
    {f:"Argument 2 + exemple",c:[["Secondly,...","Deuxièmement,..."],["Furthermore,...","En outre,..."],["In addition to this,...","En plus de cela,..."]]},

   steps:[
    {f:"Structure de base",c:[["Subject + be + -ing + lieu","Sujet + be + -ing + lieu"],["A man is reading a book in a library.","Ex. : Un homme lit dans une bibliothèque."],["Two children are playing in the park.","Ex. : Deux enfants jouent dans le parc."]]},

let mode="spk", ex=null;
const $=id=>document.getElementById(id);
const LKEY="toeic_builder_learned", THKEY="toeic_theme";
let learned; try{learned=new Set(JSON.parse(localStorage.getItem(LKEY)||"[]"));}catch(e){learned=new Set();}
function saveLearned(){try{localStorage.setItem(LKEY,JSON.stringify([...learned]));}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}

let theme; try{theme=localStorage.getItem(THKEY);}catch(e){} if(!theme)theme="dark";
function applyTheme(t){document.body.classList.toggle("light",t==="light");$("theme").textContent=t==="dark"?"☀️ Mode clair":"🌙 Mode sombre";}
applyTheme(theme);
$("theme").onclick=()=>{theme=document.body.classList.contains("light")?"dark":"light";applyTheme(theme);try{localStorage.setItem(THKEY,theme);}catch(e){}};

function buildChips(){
  const set=DATA[mode], keys=Object.keys(set); ex=keys[0];
  $("chips").innerHTML=keys.map((k,i)=>`<button class="chip" data-k="${k}" aria-pressed="${i===0}">${set[k].name}</button>`).join("");
  $("chips").querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ex=b.dataset.k;$("chips").querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed",x===b));render();});
}
function showLearn(yes){ ["chips","content","hint","exwrap"].forEach(id=>{const e=$(id);if(e)e.style.display=yes?"":"none";}); const tb=document.querySelector(".toolbar"); if(tb)tb.style.display=yes?"":"none"; $("quiz").style.display=yes?"none":""; }
function setMode(m){
  ["m-spk","m-wrt","m-quiz"].forEach(id=>$(id).setAttribute("aria-pressed", id==="m-"+m));
  if(m==="quiz"){ showLearn(false); startQuiz(); }
  else { mode=m; showLearn(true); buildChips(); render(); }
}
$("m-spk").onclick=()=>setMode("spk");
$("m-wrt").onclick=()=>setMode("wrt");
$("m-quiz").onclick=()=>setMode("quiz");

let testMode=false;
$("testBtn").onclick=()=>{testMode=!testMode;document.body.classList.toggle("test",testMode);$("testBtn").textContent=testMode?"👁 Mode test : ON":"👁 Mode test";$("hint").textContent=testMode?"Retrouve la phrase de mémoire, puis touche le bloc pour révéler.":"";render();};

function id(si,ci){return mode+"|"+ex+"|"+si+"|"+ci;}
function render(){
  const d=DATA[mode][ex]; $("exinfo").textContent=d.info;
  $("content").innerHTML=d.steps.map((st,si)=>`<div class="step" data-si="${si}">
    <h3><span class="n">${si+1}</span>${esc(st.f)}</h3>
    ${st.c.map((ch,ci)=>`<div class="chunk ${learned.has(id(si,ci))?'done':''}" data-si="${si}" data-ci="${ci}">
      <div><div class="en">${esc(ch[0])}</div><div class="fr">${esc(ch[1])}</div></div><div class="mark">✓</div></div>`).join("")}
  </div>`).join("");
  $("example").innerHTML=d.ex.map(e=>`<div class="example-item"><b>${esc(e[0])}</b>${esc(e[1])}</div>`).join("");
  $("content").querySelectorAll(".chunk").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const st=el.closest(".step");
    if(testMode && !st.classList.contains("reveal")){ st.classList.add("reveal"); return; }
    const key=id(+el.dataset.si,+el.dataset.ci);
    if(learned.has(key))learned.delete(key); else learned.add(key);
    saveLearned(); el.classList.toggle("done"); updateCount();
  });
  if(testMode) $("content").querySelectorAll(".step").forEach(st=>st.onclick=()=>st.classList.add("reveal"));
  updateCount();
}
function updateCount(){ $("learned").textContent=learned.size; }
$("reset").onclick=()=>{ if(confirm("Réinitialiser toutes les phrases apprises ?")){learned.clear();saveLearned();render();} };

// ---------------- mode Exercices ----------------
const ERRORS=[

 {o:["I work here since 5 years.","I have worked here for 5 years."],c:1,n:"for + durée ; present perfect."},
 {o:["He explained me the plan.","He explained the plan to me."],c:1,n:"explain something TO someone."},
 {o:["We discussed about it.","We discussed it."],c:1,n:"discuss est transitif direct."},

let pool=[], qi=0, qscore=0, answered=false, ended=false;
function buildPool(){
  const chunks=[];
  ["spk","wrt"].forEach(m=>Object.values(DATA[m]).forEach(exo=>exo.steps.forEach(st=>st.c.forEach(ch=>chunks.push({fn:st.f,en:ch[0],fr:ch[1]})))));
  const qcm=chunks.slice().sort(()=>Math.random()-.5).slice(0,75).map(ch=>{
    const d=chunks.filter(x=>x.fn!==ch.fn && x.en!==ch.en).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.en);
    const opts=[ch.en,...d].sort(()=>Math.random()-.5);
    return {prompt:"Quelle formule pour : « "+ch.fn+" » ?",options:opts,correct:opts.indexOf(ch.en),note:ch.fr};
  });
  const errs=ERRORS.slice().sort(()=>Math.random()-.5).map(e=>({prompt:"Choisis la phrase correcte :",options:e.o,correct:e.c,note:e.n}));
  return qcm.concat(errs).sort(()=>Math.random()-.5).slice(0,100);
}
function startQuiz(){ pool=buildPool(); qi=0; qscore=0; ended=false; $("qtotal").textContent=pool.length; $("qnext").textContent="Question suivante →"; showQ(); }
function showQ(){
  answered=false; const q=pool[qi]; $("qscore").textContent=qscore;
  $("qprompt").textContent=(qi+1)+". "+q.prompt;
  $("qopts").innerHTML=q.options.map((o,i)=>`<button class="opt" data-i="${i}">${esc(o)}</button>`).join("");
  $("qfb").textContent=""; $("qnext").style.display="none";
  $("qopts").querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(answered)return; answered=true; const i=+b.dataset.i, ok=i===q.correct;
    $("qopts").querySelectorAll(".opt").forEach((x,xi)=>{ if(xi===q.correct)x.classList.add("good"); if(xi===i&&!ok)x.classList.add("bad"); x.style.pointerEvents="none"; });
    if(ok){qscore++;$("qfb").textContent="✅ Correct. "+(q.note||"");} else {$("qfb").textContent="❌ "+(q.note||"")+" → Bonne réponse : "+q.options[q.correct];}
    $("qscore").textContent=qscore; $("qnext").style.display="";
  });
}
$("qnext").onclick=()=>{
  if(ended){ startQuiz(); return; }
  qi++;
  if(qi<pool.length){ showQ(); }
  else { ended=true; $("qprompt").textContent="Série terminée — Score : "+qscore+" / "+pool.length; $("qopts").innerHTML=""; $("qfb").textContent="Bravo. Touche pour refaire une nouvelle série."; $("qnext").textContent="↻ Nouvelle série"; }
};

setMode("spk");
</script>
