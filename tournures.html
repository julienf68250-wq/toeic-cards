<style>
  :root{ --bg:#ece9f6; --card:#fff; --ink:#1a1430; --muted:#6b6580;
    --pri:#7c5cff; --pri-d:#5b3fd1; --green:#169d6a; --amber:#e08a1e;
    --line:#ddd7ef; --shadow:0 18px 40px -18px rgba(26,20,48,.45); --radius:22px; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#f3f1fb 0%,var(--bg) 55%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;min-height:100%;
    padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));}
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;flex:1}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:4px 2px 12px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pri);margin-top:1px}
  .stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.5;white-space:nowrap}
  .stats b{color:var(--green)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1400px;min-height:320px}
  .card{position:relative;width:100%;height:360px;cursor:pointer;transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,.2,.2,1)}
  .card.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 26px;text-align:center;border:1px solid rgba(255,255,255,.6)}
  .face .eyebrow{position:absolute;top:18px;left:0;right:0;font-size:10.5px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;color:var(--pri)}
  .q{font-size:clamp(19px,5.5vw,25px);font-weight:700;line-height:1.3}
  .back{transform:rotateY(180deg);background:linear-gradient(170deg,#fff,#f3f0ff)}
  .a{font-size:clamp(18px,5vw,23px);font-weight:800;color:var(--pri-d);line-height:1.28}
  .note{margin-top:16px;font-size:13.5px;color:var(--muted);line-height:1.5;max-width:92%}
  .hint{position:absolute;bottom:16px;left:0;right:0;font-size:11.5px;color:#aaa3c2;font-weight:600}
  .rate{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn{border:0;border-radius:14px;padding:15px;font-size:14.5px;font-weight:800;cursor:pointer;color:#fff;transition:.12s}
  .btn:active{transform:scale(.97)}
  .again{background:var(--amber)} .know{background:var(--green)}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
  .nav button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;
    font-size:13px;padding:11px;border-radius:12px;cursor:pointer}
  .nav button:active{background:#efecfa}
  .bar{height:6px;background:#d8d1ef;border-radius:99px;overflow:hidden;margin:14px 2px 2px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--pri),var(--green));transition:width .3s}
  .done{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 26px;height:360px}
  .done h2{margin:0 0 6px;font-size:24px}.done p{color:var(--muted);margin:0 0 22px}
  .done button{background:var(--pri);color:#fff;border:0;border-radius:14px;padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer}
  @media (prefers-reduced-motion:reduce){.card{transition:none}}
  /* --- mode sombre --- */
  body.dark{ --bg:#10151c; --card:#1a2230; --ink:#e8edf4; --muted:#93a1b2; --line:#2a3440;
    background:radial-gradient(120% 80% at 50% -10%,#16212e 0%,#0d1117 60%); }
  body.dark .chip{ background:#1d2734; border-color:#2a3440; color:#93a1b2; }
  body.dark .chip[aria-pressed="true"]{ background:var(--pri); color:#fff; border-color:var(--pri); }
  body.dark .nav button{ background:#1d2734; color:#e8edf4; border-color:#2a3440; }
  body.dark .nav button:active{ background:#243042; }
  body.dark .bar{ background:#2a3440; }
  body.dark .face{ border-color:rgba(255,255,255,.06); }
  body.dark .back{ background:linear-gradient(170deg,#1d2634,#18202c); }
  body.dark .done{ background:var(--card); }
  body.dark .hint{ color:#5d6b7a; }
  body.dark .a{ color:#b3a0ff; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Tournures<small>TOEIC · Oral & Écrit</small></div>
    <div class="stats"><span id="remain">—</span> à réviser<br><b id="known">0</b> maîtrisées</div>
  </header>
  <div class="chips" id="chips"></div>
  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Carte, taper pour voir la formule">
      <div class="face front">
        <div class="eyebrow" id="cat-f"></div>
        <div class="q" id="front"></div>
        <div class="hint">Taper pour voir la formule</div>
      </div>
      <div class="face back">
        <div class="eyebrow" id="cat-b"></div>
        <div class="a" id="answer"></div>
        <div class="note" id="note"></div>
      </div>
    </div>
    <div class="done" id="done">
      <h2>Série terminée 🎉</h2>
      <p id="done-msg"></p>
      <button id="restart">Recommencer cette catégorie</button>
    </div>
  </div>
  <div class="rate" id="rate">
    <button class="btn again" id="again">À revoir</button>
    <button class="btn know" id="know">Je savais</button>
  </div>
  <div class="nav">
    <button id="prev">◀ Précédent</button>
    <button id="shuffle">🔀 Mélanger</button>
    <button id="next">Suivant ▶</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
</div>
<script>
const DATA = [{"c": "Opinion", "q": "Annoncer ton opinion", "a": "In my opinion, ... / I firmly believe that ...", "note": "Ouvre TOUJOURS par ta position (Q11, essai)."}, {"c": "Opinion", "q": "Donner ton point de vue (variante)", "a": "From my perspective, ... / I would argue that ...", "note": "Varie les formulations pour l'étendue lexicale."}, {"c": "Opinion", "q": "Dire qu'il n'y a aucun doute", "a": "There is no doubt that ...", "note": "Renforce une position assumée."}, {"c": "Opinion", "q": "Donner un avis global", "a": "Overall, I would say that ...", "note": "Utile en synthèse."}, {"c": "Opinion", "q": "Conclure / résumer", "a": "To sum up, ... / In conclusion, ...", "note": "Annonce clairement la fin."}, {"c": "Opinion", "q": "Conclusion : reformuler ta position", "a": "For these reasons, I believe that ...", "note": "Boucle sur l'intro."}, {"c": "Raisons & exemples", "q": "Donner la raison principale", "a": "The main reason is that ...", "note": "Juste après ta position."}, {"c": "Raisons & exemples", "q": "Ajouter un argument", "a": "What's more, ... / Furthermore, ...", "note": "Furthermore = registre soutenu (écrit)."}, {"c": "Raisons & exemples", "q": "Introduire un exemple", "a": "For instance, ... / To illustrate, ...", "note": "Un exemple par argument = clé du B2."}, {"c": "Raisons & exemples", "q": "Donner un exemple personnel", "a": "In my own experience, ...", "note": "Très efficace à l'oral (Q11)."}, {"c": "Raisons & exemples", "q": "Présenter un avantage", "a": "One key advantage is that ...", "note": ""}, {"c": "Raisons & exemples", "q": "Exprimer une conséquence", "a": "As a result, ... / Consequently, ...", "note": ""}, {"c": "Opposition", "q": "Introduire une opposition", "a": "However, ... / On the other hand, ...", "note": "Pivot classique d'un essai équilibré."}, {"c": "Opposition", "q": "Concéder un point", "a": "It is true that ..., but ... / Although this is true, ...", "note": "Montre de la nuance (apprécié au B2)."}, {"c": "Opposition", "q": "Nuancer : « ça dépend »", "a": "It depends largely on ...", "note": ""}, {"c": "Opposition", "q": "Reconnaître un inconvénient", "a": "There are drawbacks, such as ...", "note": ""}, {"c": "Opposition", "q": "Malgré tout, renforcer ta position", "a": "Nevertheless, I still believe that ...", "note": "Reprend la main après la concession."}, {"c": "Décrire une photo", "q": "Présenter la photo", "a": "This picture shows ... / It looks like ...", "note": "1re phrase (Speaking Q3-4)."}, {"c": "Décrire une photo", "q": "Premier plan", "a": "In the foreground, ... is -ing ...", "note": "Présent continu obligatoire."}, {"c": "Décrire une photo", "q": "Arrière-plan", "a": "In the background, I can see ...", "note": ""}, {"c": "Décrire une photo", "q": "Décrire une action en cours", "a": "They seem to be -ing ...", "note": "Quand tu n'es pas sûr de l'action."}, {"c": "Décrire une photo", "q": "Situer : à gauche / à droite", "a": "On the left/right, there is ...", "note": ""}, {"c": "Décrire une photo", "q": "Donner une impression", "a": "The atmosphere seems ... / They appear to be ...", "note": "Phrase de clôture en 30 s."}, {"c": "Email : cadre", "q": "Formule d'appel", "a": "Dear Mr/Ms [Name],", "note": "Registre pro."}, {"c": "Email : cadre", "q": "Ouverture (accuser réception)", "a": "Thank you for your email regarding ...", "note": ""}, {"c": "Email : cadre", "q": "Annoncer la raison du message", "a": "I am writing to ...", "note": ""}, {"c": "Email : cadre", "q": "Clôture", "a": "I look forward to hearing from you.", "note": ""}, {"c": "Email : cadre", "q": "Signature", "a": "Best regards, [Name]", "note": ""}, {"c": "Email : intentions", "q": "Faire une demande polie", "a": "Could you please ...? / I would like to request ...", "note": ""}, {"c": "Email : intentions", "q": "Poser une question", "a": "I would like to know whether ...", "note": ""}, {"c": "Email : intentions", "q": "Faire une suggestion", "a": "I would suggest ... / How about -ing ...?", "note": ""}, {"c": "Email : intentions", "q": "Se plaindre", "a": "I am writing to complain about ... / Unfortunately, ...", "note": ""}, {"c": "Email : intentions", "q": "S'excuser", "a": "I apologize for ... / Please accept my apologies.", "note": ""}, {"c": "Email : intentions", "q": "Confirmer", "a": "I am pleased to confirm that ...", "note": ""}, {"c": "Email : intentions", "q": "Refuser poliment", "a": "I'm afraid I won't be able to ...", "note": ""}, {"c": "Essai : structure", "q": "Introduire le sujet", "a": "This essay will discuss whether ...", "note": ""}, {"c": "Essai : structure", "q": "Premier argument", "a": "First of all, ... / To begin with, ...", "note": ""}, {"c": "Essai : structure", "q": "Deuxième argument", "a": "Secondly, ... / In addition, ...", "note": ""}, {"c": "Essai : structure", "q": "Transition vers l'opposé", "a": "On the other hand, ... / That said, ...", "note": ""}, {"c": "Essai : structure", "q": "Conclure l'essai", "a": "To conclude, ... / All things considered, ...", "note": ""}, {"c": "Oral : fluidité", "q": "Gagner 2 s avant de répondre", "a": "Well, that's a good question. / Let me think for a second.", "note": "Évite le blanc en début de réponse."}, {"c": "Oral : fluidité", "q": "Reformuler pour clarifier", "a": "What I mean is ... / In other words, ...", "note": ""}, {"c": "Oral : fluidité", "q": "Marquer une hésitation naturelle", "a": "I'd say ... / I suppose ...", "note": "Sonne naturel, pas robotique."}, {"c": "Oral : fluidité", "q": "Enchaîner une nouvelle idée", "a": "Also, ... / Another thing is ...", "note": ""}, {"c": "Répondre (Q5-7)", "q": "Répondre par oui + détail", "a": "Yes, I usually ... because ...", "note": "Jamais un mot seul : phrase complète + raison."}, {"c": "Répondre (Q5-7)", "q": "Donner une préférence", "a": "I prefer ... rather than ..., because ...", "note": ""}, {"c": "Répondre (Q5-7)", "q": "Donner une fréquence", "a": "I tend to ... about twice a week.", "note": ""}, {"c": "Répondre (Q5-7)", "q": "Exprimer un souhait / une intention", "a": "I would love to ... / I'm planning to ...", "note": ""}];
const cats=[...new Set(DATA.map(d=>d.c))];
const LS_KEY="toeic_phrases_v1";
let store={known:[],filter:"Tout"};
function load(){try{const r=localStorage.getItem(LS_KEY);if(r)store={...store,...JSON.parse(r)};}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify({...store,known:[...known]}));}catch(e){}}
load();
let filter=store.filter||"Tout",deck=[],idx=0,flipped=false;
const known=new Set(store.known||[]);
const cardId=d=>d.c+"|"+d.q;
const $=id=>document.getElementById(id);
const card=$("card");
const chips=$("chips");
["Tout",...cats].forEach(c=>{
  const b=document.createElement("button");
  b.className="chip";b.textContent=c;b.setAttribute("aria-pressed",c===filter);
  b.onclick=()=>{filter=c;store.filter=c;save();[...chips.children].forEach(x=>x.setAttribute("aria-pressed",x===b));rebuild();};
  chips.appendChild(b);
});
function pool(){return DATA.filter(d=>filter==="Tout"||d.c===filter);}
function rebuild(){deck=pool().filter(d=>!known.has(cardId(d)));idx=0;flipped=false;render();}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;flipped=false;render();}
function render(){
  const total=pool().length,kn=pool().filter(d=>known.has(cardId(d))).length;
  $("known").textContent=kn;$("remain").textContent=deck.length;
  $("prog").style.width=total?Math.round(kn/total*100)+"%":"0%";
  if(deck.length===0){card.style.display="none";$("rate").style.visibility="hidden";$("done").style.display="flex";
    $("done-msg").textContent=total?(total+" tournures maîtrisées dans « "+filter+" »."):"Aucune carte ici.";return;}
  card.style.display="";$("done").style.display="none";$("rate").style.visibility="visible";
  if(idx>=deck.length)idx=0;if(idx<0)idx=deck.length-1;
  const d=deck[idx];
  $("front").textContent=d.q;$("answer").textContent=d.a;$("note").textContent=d.note||"";
  $("cat-f").textContent=d.c;$("cat-b").textContent=d.c;
  card.classList.toggle("flip",flipped);
}
function flip(){flipped=!flipped;card.classList.toggle("flip",flipped);}
function go(s){if(!deck.length)return;flipped=false;idx=(idx+s+deck.length)%deck.length;render();}
function markKnown(){if(!deck.length)return;known.add(cardId(deck[idx]));save();deck.splice(idx,1);flipped=false;render();}
function markAgain(){go(1);}
card.onclick=flip;
card.onkeydown=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}};
$("next").onclick=()=>go(1);$("prev").onclick=()=>go(-1);$("shuffle").onclick=shuffle;
$("again").onclick=markAgain;$("know").onclick=markKnown;
$("restart").onclick=()=>{pool().forEach(d=>known.delete(cardId(d)));save();rebuild();};
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);
  if(e.key.toLowerCase()==="k")markKnown();if(e.key.toLowerCase()==="a")markAgain();});
const resetBtn=document.createElement("button");
resetBtn.textContent="\u21BA Réinitialiser ma progression";
resetBtn.style.cssText="margin:12px auto 0;display:block;font-size:11px;color:#9aa0a6;background:none;border:0;cursor:pointer";
resetBtn.onclick=()=>{if(confirm("Effacer toute la progression mémorisée ?")){known.clear();store.known=[];store.filter="Tout";save();filter="Tout";[...chips.children].forEach((x,i)=>x.setAttribute("aria-pressed",i===0));rebuild();}};
// thème clair/sombre (défaut sombre, partagé sur le même domaine)
const THKEY="toeic_theme";
const applyTheme=t=>document.body.classList.toggle("dark",t==="dark");
let theme; try{theme=localStorage.getItem(THKEY);}catch(e){} if(!theme)theme="dark"; applyTheme(theme);
const themeBtn=document.createElement("button");
themeBtn.style.cssText=resetBtn.style.cssText;
const lblTheme=()=>themeBtn.textContent=theme==="dark"?"☀️ Mode clair":"🌙 Mode sombre"; lblTheme();
themeBtn.onclick=()=>{theme=document.body.classList.contains("dark")?"light":"dark";applyTheme(theme);try{localStorage.setItem(THKEY,theme);}catch(e){}lblTheme();};
const footer=document.createElement("div");
footer.style.cssText="display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap";
footer.appendChild(resetBtn);footer.appendChild(themeBtn);
document.querySelector(".wrap").appendChild(footer);
rebuild();
</script>
