<style>
  :root{ --bg:#e6efed; --card:#fff; --ink:#10241f; --muted:#637771;
    --teal:#0f9d8f; --teal-d:#0a7a6f; --green:#169d6a; --amber:#e08a1e;
    --line:#d3e0dc; --shadow:0 18px 40px -18px rgba(16,36,31,.45); --radius:22px; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%,#f0f6f5 0%,var(--bg) 55%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;min-height:100%;
    padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));}
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;flex:1}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:4px 2px 12px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand small{display:block;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-top:1px}
  .stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.5;white-space:nowrap}
  .stats b{color:var(--green)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1400px;min-height:320px}
  .card{position:relative;width:100%;height:360px;cursor:pointer;transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.4,.2,.2,1)}
  .card.flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 26px;text-align:center;border:1px solid rgba(255,255,255,.6)}
  .face .eyebrow{position:absolute;top:18px;left:0;right:0;font-size:10.5px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--teal)}
  .q{font-size:clamp(18px,5vw,23px);font-weight:700;line-height:1.35}
  .back{transform:rotateY(180deg);background:linear-gradient(170deg,#fff,#eefaf8)}
  .a{font-size:clamp(20px,5.5vw,26px);font-weight:800;color:var(--teal-d);line-height:1.2}
  .note{margin-top:16px;font-size:14px;color:var(--muted);line-height:1.5;max-width:92%}
  .hint{position:absolute;bottom:16px;left:0;right:0;font-size:11.5px;color:#a7b6b1;font-weight:600}
  .rate{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .btn{border:0;border-radius:14px;padding:15px;font-size:14.5px;font-weight:800;cursor:pointer;color:#fff;transition:.12s}
  .btn:active{transform:scale(.97)}
  .again{background:var(--amber)} .know{background:var(--green)}
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
  .nav button{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;
    font-size:13px;padding:11px;border-radius:12px;cursor:pointer}
  .nav button:active{background:#eaf3f1}
  .bar{height:6px;background:#cfe0db;border-radius:99px;overflow:hidden;margin:14px 2px 2px}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .3s}
  .done{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 26px;height:360px}
  .done h2{margin:0 0 6px;font-size:24px}.done p{color:var(--muted);margin:0 0 22px}
  .done button{background:var(--teal);color:#fff;border:0;border-radius:14px;padding:14px 26px;font-weight:800;font-size:15px;cursor:pointer}
  @media (prefers-reduced-motion:reduce){.card{transition:none}}
  /* --- mode sombre --- */
  body.dark{ --bg:#10151c; --card:#1a2230; --ink:#e8edf4; --muted:#93a1b2; --line:#2a3440;
    background:radial-gradient(120% 80% at 50% -10%,#16212e 0%,#0d1117 60%); }
  body.dark .chip{ background:#1d2734; border-color:#2a3440; color:#93a1b2; }
  body.dark .chip[aria-pressed="true"]{ background:var(--teal); color:#fff; border-color:var(--teal); }
  body.dark .nav button{ background:#1d2734; color:#e8edf4; border-color:#2a3440; }
  body.dark .nav button:active{ background:#243042; }
  body.dark .bar{ background:#2a3440; }
  body.dark .face{ border-color:rgba(255,255,255,.06); }
  body.dark .back{ background:linear-gradient(170deg,#1d2634,#18202c); }
  body.dark .done{ background:var(--card); }
  body.dark .hint{ color:#5d6b7a; }
  body.dark .a{ color:#3ad6c4; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Grammaire<small>TOEIC · Objectif B2</small></div>
    <div class="stats"><span id="remain">—</span> à réviser<br><b id="known">0</b> maîtrisées</div>
  </header>
  <div class="chips" id="chips"></div>
  <div class="stage">
    <div class="card" id="card" role="button" tabindex="0" aria-label="Carte, taper pour voir la réponse">
      <div class="face front">
        <div class="eyebrow" id="cat-f"></div>
        <div class="q" id="front"></div>
        <div class="hint">Taper pour voir la réponse</div>
      </div>
      <div class="face back">
        <div class="eyebrow" id="cat-b"></div>
        <div class="a" id="answer"></div>
        <div class="note" id="note"></div>
      </div>
    </div>
    <div class="done" id="done">
      <h2>Série terminée 🎉</h2>
      <p id="done-msg"></p>
      <button id="restart">Recommencer cette notion</button>
    </div>
  </div>
  <div class="rate" id="rate">
    <button class="btn again" id="again">À revoir</button>
    <button class="btn know" id="know">Je savais</button>
  </div>
  <div class="nav">
    <button id="prev">◀ Précédent</button>
    <button id="shuffle">🔀 Mélanger</button>
    <button id="next">Suivant ▶</button>
  </div>
  <div class="bar"><i id="prog"></i></div>
</div>
<script>
const DATA = [{"c":"Temps","q":"I ___ (live) here since 2019.","a":"have lived","note":"Present perfect + since : action commencée dans le passé qui continue."},{"c":"Temps","q":"« depuis 5 ans » : for ou since ?","a":"for 5 years","note":"for + durée ; since + point de départ (since 2019)."},{"c":"Temps","q":"I ___ (see) him yesterday.","a":"saw","note":"Prétérit pour une action passée datée et terminée — jamais le present perfect avec yesterday."},{"c":"Temps","q":"She ___ (work) all morning and is exhausted.","a":"has been working","note":"Present perfect continu : action récente prolongée, effet visible maintenant."},{"c":"Temps","q":"The meeting ___ (end) before I arrived.","a":"had ended","note":"Past perfect : antériorité par rapport à un autre fait passé."},{"c":"Temps","q":"will vs going to : décision spontanée ?","a":"will","note":"will = décision/prédiction ; going to = intention déjà prévue."},{"c":"Conditionnels","q":"If we hurry, we ___ (make) it.","a":"will make","note":"Type 1 (probable) : if + présent, ... will + base."},{"c":"Conditionnels","q":"If I ___ (have) time, I would help.","a":"had","note":"Type 2 (hypothétique) : if + prétérit, ... would + base."},{"c":"Conditionnels","q":"If I ___ (know), I would have come.","a":"had known","note":"Type 3 (irréel passé) : if + past perfect, ... would have + participe."},{"c":"Conditionnels","q":"Type 0 (vérité générale) : structure ?","a":"if + présent, présent","note":"Ex : If you heat ice, it melts."},{"c":"Passif","q":"Passif de : « The team wrote the report. »","a":"The report was written by the team.","note":"Passif = be + participe passé."},{"c":"Passif","q":"Passif futur : « They will deliver it. »","a":"It will be delivered.","note":"will be + participe passé."},{"c":"Passif","q":"Structure générale du passif ?","a":"be + participe passé","note":"L'agent (by...) est souvent omis s'il n'est pas utile."},{"c":"Relatives","q":"Pronom relatif pour une personne ?","a":"who (ou that)","note":"The manager who hired me."},{"c":"Relatives","q":"Pronom relatif pour une chose ?","a":"which (ou that)","note":"The file which I sent."},{"c":"Relatives","q":"Pronom relatif de possession ?","a":"whose","note":"The client whose order was late."},{"c":"Relatives","q":"Pronom relatif de lieu ?","a":"where","note":"The office where we met."},{"c":"Discours rapporté","q":"« I am busy » -> He said he ___ busy.","a":"was","note":"Recul d'un temps vers le passé (present -> prétérit)."},{"c":"Discours rapporté","q":"« I will call » -> She said she ___ call.","a":"would","note":"will -> would au discours rapporté."},{"c":"Discours rapporté","q":"say ou tell : « He ___ me that... »","a":"told","note":"tell + personne (told me) ; say + chose (said that)."},{"c":"Gérondif/infinitif","q":"I look forward to ___ (meet) you.","a":"meeting","note":"look forward to + -ing (to est ici une préposition)."},{"c":"Gérondif/infinitif","q":"We decided ___ (launch) it.","a":"to launch","note":"decide / want / plan / hope + to + base."},{"c":"Gérondif/infinitif","q":"Après « enjoy » : -ing ou to ?","a":"-ing","note":"enjoy / avoid / suggest / recommend + -ing."},{"c":"Gérondif/infinitif","q":"Après « be used to » : -ing ou to ?","a":"-ing","note":"be used to + -ing (avoir l'habitude de). Ex : used to working."},{"c":"Modaux","q":"Obligation forte = ?","a":"must / have to","note":"You must submit it."},{"c":"Modaux","q":"Conseil = ?","a":"should / ought to","note":"You should check the figures."},{"c":"Modaux","q":"« That ___ be right » (impossibilité logique)","a":"can't","note":"can't / couldn't = c'est impossible que."},{"c":"Modaux","q":"Possibilité = ?","a":"might / may / could","note":"It might rain later."},{"c":"Comparatifs","q":"Comparatif/superlatif de « cheap » ?","a":"cheaper / the cheapest","note":"Adjectif court : + -er / the + -est."},{"c":"Comparatifs","q":"Comparatif de « efficient » ?","a":"more efficient / the most efficient","note":"Adjectif long : more / the most."},{"c":"Comparatifs","q":"good -> ? -> ?","a":"better -> best","note":"Irrégulier. bad -> worse -> worst."},{"c":"Comparatifs","q":"« aussi vite que possible »","a":"as fast as possible","note":"as + adjectif/adverbe + as."},{"c":"Prépositions","q":"depend ___","a":"on","note":"It depends on the budget."},{"c":"Prépositions","q":"interested ___","a":"in","note":"interested in + nom / -ing."},{"c":"Prépositions","q":"responsible ___","a":"for","note":"responsible for the project."},{"c":"Prépositions","q":"good ___ (compétence)","a":"at","note":"good at negotiating."},{"c":"Prépositions","q":"arrive ___ a city","a":"in","note":"arrive in + ville/pays ; arrive at + lieu précis."},{"c":"Pièges FR","q":"Corrige : « I am agree with you. »","a":"I agree with you.","note":"agree est un verbe, pas un adjectif."},{"c":"Pièges FR","q":"Corrige : « some informations / advices »","a":"some information / advice","note":"Indénombrables : jamais de -s, jamais de a/an."},{"c":"Pièges FR","q":"Corrige : « He explained me the plan. »","a":"He explained the plan to me.","note":"explain something TO someone."},{"c":"Pièges FR","q":"Corrige : « We discussed about it. »","a":"We discussed it.","note":"discuss est transitif direct, sans préposition."},{"c":"Pièges FR","q":"Corrige : « I did a mistake. »","a":"I made a mistake.","note":"make a mistake / a decision ; do = effectuer une tâche."},{"c":"Pièges FR","q":"Corrige : « during 3 hours »","a":"for 3 hours","note":"for + durée ; during + nom d'événement (during the meeting)."},{"c":"Pièges FR","q":"Corrige : « a car red »","a":"a red car","note":"L'adjectif se place AVANT le nom."},{"c":"Pièges FR","q":"Corrige : « ...when I will arrive »","a":"...when I arrive","note":"Pas de futur après when / if : on utilise le présent."},{"c":"Pièges FR","q":"Corrige : « I have 30 years. »","a":"I am 30 years old.","note":"L'âge s'exprime avec be."},{"c":"Pièges FR","q":"Corrige : « The people is here. »","a":"The people are here.","note":"people = pluriel."},{"c":"Connecteurs","q":"« bien que » + sujet+verbe = ?","a":"although / even though","note":"Although it was late, we finished."},{"c":"Connecteurs","q":"« malgré » + nom = ?","a":"despite / in spite of","note":"Despite the delay, ... (+ nom ou -ing)."},{"c":"Connecteurs","q":"« donc / par conséquent » = ?","a":"therefore / consequently","note":"Registre soutenu, idéal en Writing."},{"c":"Connecteurs","q":"« cependant » = ?","a":"however / nevertheless","note":"Introduit une opposition."},{"c":"Connecteurs","q":"« afin de » = ?","a":"in order to","note":"in order to + base verbale."},{"c":"Articles","q":"a ou an : ___ hour","a":"an hour","note":"an devant un SON voyelle (le h est muet)."},{"c":"Articles","q":"a ou an : ___ university","a":"a university","note":"a devant un son consonne (you-niversity)."},{"c":"Articles","q":"« ___ cars pollute » (généralité)","a":"Cars pollute (zéro article)","note":"Pas d'article pour une généralité au pluriel."},{"c":"Articles","q":"« I go to ___ work » : the ?","a":"to work (sans article)","note":"work, home, school : sans the."},{"c":"Articles","q":"the : « ___ sun »","a":"the sun","note":"the devant un objet unique."},{"c":"Quantifieurs","q":"much ou many : ___ information","a":"much information","note":"much + indénombrable."},{"c":"Quantifieurs","q":"much ou many : ___ people","a":"many people","note":"many + dénombrable pluriel."},{"c":"Quantifieurs","q":"few ou little : ___ time","a":"little time","note":"little + indénombrable (peu de)."},{"c":"Quantifieurs","q":"few ou little : ___ friends","a":"few friends","note":"few + dénombrable."},{"c":"Quantifieurs","q":"some ou any : « I don't have ___ money »","a":"any money","note":"any en négatif/interro ; some en affirmatif."},{"c":"Prép. de temps","q":"in/on/at : ___ Monday","a":"on Monday","note":"on + jour/date."},{"c":"Prép. de temps","q":"in/on/at : ___ 9 a.m.","a":"at 9 a.m.","note":"at + heure précise."},{"c":"Prép. de temps","q":"in/on/at : ___ July / 2025","a":"in July / in 2025","note":"in + mois/année/saison."},{"c":"Prép. de temps","q":"« ___ the morning »","a":"in the morning","note":"in the morning/afternoon, MAIS at night."},{"c":"Used to","q":"« Avant, je fumais » (habitude passée)","a":"I used to smoke.","note":"used to + base = habitude passée révolue."},{"c":"Used to","q":"« Je ne suis pas habitué à parler en public »","a":"I'm not used to speaking in public.","note":"be used to + -ing = être habitué (≠ used to)."},{"c":"Questions","q":"Forme la question : « He works here. »","a":"Does he work here?","note":"do/does + base (présent simple)."},{"c":"Questions","q":"Rapportée : « Where do you live? » -> He asked ...","a":"He asked where I lived.","note":"Ordre sujet-verbe, pas d'inversion, recul du temps."},{"c":"Questions","q":"Tag : « You're coming, ___ ? »","a":"aren't you?","note":"Auxiliaire inversé, polarité opposée."},{"c":"Causatif","q":"« Je fais réparer ma voiture » (par qqn)","a":"I have/get my car repaired.","note":"have/get + objet + participe passé."},{"c":"Causatif","q":"« Le manager m'a fait refaire le rapport »","a":"The manager had me redo the report.","note":"have + personne + base verbale."},{"c":"So/too/enough","q":"so ou such : « It was ___ a good film »","a":"such a good film","note":"such + (a) + adjectif + nom."},{"c":"So/too/enough","q":"so ou such : « It was ___ good »","a":"so good","note":"so + adjectif seul."},{"c":"So/too/enough","q":"« C'est trop cher »","a":"It's too expensive.","note":"too + adjectif = excès."},{"c":"So/too/enough","q":"« pas assez grand »","a":"not big enough","note":"enough APRÈS l'adjectif."},{"c":"Adv. fréquence","q":"Place de always : « I ___ late »","a":"I am always late","note":"Après be ; mais AVANT un verbe ordinaire (I always arrive)."},{"c":"Adv. fréquence","q":"« usually » : « I ___ work from home »","a":"I usually work from home","note":"Avant le verbe principal."},{"c":"Futur","q":"Arrangement prévu : « I ___ (meet) him at 5 »","a":"I'm meeting him at 5.","note":"Présent continu = arrangement fixé."},{"c":"Futur","q":"Prédiction avec indice : « Look! It ___ (rain) »","a":"It's going to rain.","note":"going to = prédiction fondée sur un signe."},{"c":"Futur","q":"Décision spontanée : « I ___ (help) you »","a":"I'll help you.","note":"will = décision prise à l'instant."}];
const cats=[...new Set(DATA.map(d=>d.c))];
const LS_KEY="toeic_grammar_v1";
let store={known:[],filter:"Tout"};
function load(){try{const r=localStorage.getItem(LS_KEY);if(r)store={...store,...JSON.parse(r)};}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify({...store,known:[...known]}));}catch(e){}}
load();
let filter=store.filter||"Tout",deck=[],idx=0,flipped=false;
const known=new Set(store.known||[]);
const cardId=d=>d.c+"|"+d.q;
const $=id=>document.getElementById(id);
const card=$("card");
const chips=$("chips");
["Tout",...cats].forEach(c=>{
  const b=document.createElement("button");
  b.className="chip";b.textContent=c;b.setAttribute("aria-pressed",c===filter);
  b.onclick=()=>{filter=c;store.filter=c;save();[...chips.children].forEach(x=>x.setAttribute("aria-pressed",x===b));rebuild();};
  chips.appendChild(b);
});
function pool(){return DATA.filter(d=>filter==="Tout"||d.c===filter);}
function rebuild(){deck=pool().filter(d=>!known.has(cardId(d)));idx=0;flipped=false;render();}
function shuffle(){for(let i=deck.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[deck[i],deck[j]]=[deck[j],deck[i]];}idx=0;flipped=false;render();}
function render(){
  const total=pool().length,kn=pool().filter(d=>known.has(cardId(d))).length;
  $("known").textContent=kn;$("remain").textContent=deck.length;
  $("prog").style.width=total?Math.round(kn/total*100)+"%":"0%";
  if(deck.length===0){card.style.display="none";$("rate").style.visibility="hidden";$("done").style.display="flex";
    $("done-msg").textContent=total?(total+" notions maîtrisées dans « "+filter+" »."):"Aucune carte ici.";return;}
  card.style.display="";$("done").style.display="none";$("rate").style.visibility="visible";
  if(idx>=deck.length)idx=0;if(idx<0)idx=deck.length-1;
  const d=deck[idx];
  $("front").textContent=d.q;$("answer").textContent=d.a;$("note").textContent=d.note||"";
  $("cat-f").textContent=d.c;$("cat-b").textContent=d.c;
  card.classList.toggle("flip",flipped);
}
function flip(){flipped=!flipped;card.classList.toggle("flip",flipped);}
function go(s){if(!deck.length)return;flipped=false;idx=(idx+s+deck.length)%deck.length;render();}
function markKnown(){if(!deck.length)return;known.add(cardId(deck[idx]));save();deck.splice(idx,1);flipped=false;render();}
function markAgain(){go(1);}
card.onclick=flip;
card.onkeydown=e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}};
$("next").onclick=()=>go(1);$("prev").onclick=()=>go(-1);$("shuffle").onclick=shuffle;
$("again").onclick=markAgain;$("know").onclick=markKnown;
$("restart").onclick=()=>{pool().forEach(d=>known.delete(cardId(d)));save();rebuild();};
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1);
  if(e.key.toLowerCase()==="k")markKnown();if(e.key.toLowerCase()==="a")markAgain();});
const resetBtn=document.createElement("button");
resetBtn.textContent="\u21BA Réinitialiser ma progression";
resetBtn.style.cssText="margin:12px auto 0;display:block;font-size:11px;color:#9aa0a6;background:none;border:0;cursor:pointer";
resetBtn.onclick=()=>{if(confirm("Effacer toute la progression mémorisée ?")){known.clear();store.known=[];store.filter="Tout";save();filter="Tout";[...chips.children].forEach((x,i)=>x.setAttribute("aria-pressed",i===0));rebuild();}};
// thème clair/sombre (défaut sombre, partagé sur le même domaine)
const THKEY="toeic_theme";
const applyTheme=t=>document.body.classList.toggle("dark",t==="dark");
let theme; try{theme=localStorage.getItem(THKEY);}catch(e){} if(!theme)theme="dark"; applyTheme(theme);
const themeBtn=document.createElement("button");
themeBtn.style.cssText=resetBtn.style.cssText;
const lblTheme=()=>themeBtn.textContent=theme==="dark"?"☀️ Mode clair":"🌙 Mode sombre"; lblTheme();
themeBtn.onclick=()=>{theme=document.body.classList.contains("dark")?"light":"dark";applyTheme(theme);try{localStorage.setItem(THKEY,theme);}catch(e){}lblTheme();};
const footer=document.createElement("div");
footer.style.cssText="display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap";
footer.appendChild(resetBtn);footer.appendChild(themeBtn);
document.querySelector(".wrap").appendChild(footer);
rebuild();
</script>
</body>
</html>
